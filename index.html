<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espelho de Classe - Turma 2C</title>
    <style>
        :root {
            --presente: #4caf50;
            --ausente: #f44336;
            --vazio: #e0e0e0;
            --texto: #333;
            --bg: #f5f5f5;
            --accent: #2196F3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
            overflow-x: hidden; /* Evita quebra de layout */
        }

        /* Ajustes para Tela Cheia */
        .container:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .controles {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .label-direcao {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            background: #f0f0f0;
            margin: 10px 0;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #ddd;
        }

        /* Container do Grid para permitir scroll horizontal em telas muito pequenas */
        .grid-wrapper {
            width: 100%;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .grid-sala {
            display: grid;
            /* Garante 9 colunas, mas com tamanho mínimo para não esmagar o texto */
            grid-template-columns: repeat(9, minmax(80px, 1fr)); 
            gap: 8px;
            margin: 10px 0;
            min-width: 750px; /* Mantém a estrutura de sala em telas pequenas */
        }

        .aluno {
            aspect-ratio: 1 / 1; /* Mantém quadradinho */
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            padding: 5px;
            background-color: #fff;
            color: var(--texto);
            transition: all 0.2s ease;
            word-wrap: break-word;
            line-height: 1.2;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.02);
        }

        .aluno:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .aluno.status-presente { background-color: var(--presente); color: white; border-color: #388e3c; }
        .aluno.status-ausente { background-color: var(--ausente); color: white; border-color: #d32f2f; }
        .aluno.vazio { 
            background-color: var(--vazio); 
            border: 1px dashed #bbb; 
            cursor: default; 
            opacity: 0.5;
        }

        .resumo {
            margin-top: 20px;
            padding: 15px;
            background: #fff5f5;
            border-radius: 8px;
            border-left: 5px solid var(--ausente);
            width: 100%;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
            font-size: 0.9rem;
        }

        .btn-fullscreen { background: var(--accent); color: white; }
        .btn-reset { background: #555; color: white; }
        button:active { opacity: 0.8; }

        /* Media Queries para Mobile */
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .aluno { font-size: 0.65rem; min-height: 60px; }
            .btn-fullscreen, .btn-reset { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="area-estudo">
        <div class="controles">
            <button class="btn-fullscreen" onclick="toggleFullScreen()">⛶ Tela Cheia</button>
            <button class="btn-reset" onclick="resetarChamada()">↺ Limpar Tudo</button>
        </div>

        <div class="label-direcao">Lousa / Professor</div>

        <div class="grid-wrapper">
            <div class="grid-sala" id="mapa"></div>
        </div>

        <div class="label-direcao">Fundo da Sala</div>

        <div class="resumo">
            <strong>Lista de Faltas (2C):</strong> <br>
            <span id="lista-faltas" style="color: var(--ausente); font-weight: bold;">Nenhuma.</span>
        </div>
    </div>

    <script>
        const layout = [
            ["Joaquim N.", "Clarice C.", "Kauê S.", "Davi M.", "Mateus S.", "Pedro B.", "Gabriel V.", "Pedro S.", "Augusto W."],
            ["Pedro H.", "Nicolas G.", "Ígor P.", "Heitor M.", "", "João Vitor P.", "Nicolas F.", "Vinicius F.", "Vinicius D."],
            ["Gustavo B.", "João Luz", "Arthur N.", "Pedro M.", "", "Marcos A.", "", "Arthur G.", "Bruno P."],
            ["Eloísa P.", "Beatriz W.", "Letícia S.", "", "", "Luiz Otávio H.", "Luiggi K.", "Lucas O.", "Henrique S."],
            ["Maria Luiza D.", "Arthur F.", "Marina M.", "", "", "Nicolas R.", "Arthur N.", "Paulo V.", "Nicolas S."]
        ];

        let estados = JSON.parse(localStorage.getItem('chamada_2C_v8')) || {};

        function renderizar() {
            const mapa = document.getElementById('mapa');
            const listaFaltas = document.getElementById('lista-faltas');
            mapa.innerHTML = '';
            let faltas = [];

            layout.forEach((fila, i) => {
                fila.forEach((nome, j) => {
                    const id = `${i}-${j}`;
                    const div = document.createElement('div');
                    
                    if (!nome || nome.trim() === "") {
                        div.className = 'aluno vazio';
                    } else {
                        div.className = 'aluno';
                        div.innerText = nome;
                        
                        if (estados[id] === 1) div.classList.add('status-presente');
                        if (estados[id] === 2) {
                            div.classList.add('status-ausente');
                            faltas.push(nome);
                        }

                        div.onclick = () => {
                            estados[id] = ((estados[id] || 0) + 1) % 3;
                            renderizar();
                        };
                    }
                    mapa.appendChild(div);
                });
            });

            listaFaltas.innerText = faltas.length > 0 ? faltas.join(', ') : "Todos presentes.";
            localStorage.setItem('chamada_2C_v8', JSON.stringify(estados));
        }

        function toggleFullScreen() {
            const elem = document.getElementById("area-estudo");
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    alert(`Erro ao tentar ativar tela cheia: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function resetarChamada() {
            if(confirm("Deseja realmente limpar todas as marcações da turma 2C?")) {
                estados = {};
                renderizar();
            }
        }

        // Inicializa
        renderizar();
    </script>
</body>
</html>
