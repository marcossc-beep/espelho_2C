<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espelho de Classe - Turma 2C</title>
    <style>
        :root {
            --presente: #1b5e20; /* Verde escuro (Alto contraste) */
            --ausente: #b71c1c;   /* Vermelho escuro (Alto contraste) */
            --vazio: #cfd8dc;
            --texto: #000000;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-sizing: border-box;
        }

        /* --- MODO TELA CHEIA (O QUE MUDA) --- */
        .container:fullscreen {
            padding: 10px;
            border-radius: 0;
            background: #fff;
        }

        /* Esconde os botões e o resumo em tela cheia para priorizar o mapa */
        .container:fullscreen .controles, 
        .container:fullscreen .resumo { 
            display: none; 
        }

        /* Aumenta as etiquetas de direção no fullscreen */
        .container:fullscreen .label-direcao {
            font-size: 1.2rem;
            margin: 5px 0;
        }

        .controles {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            justify-content: center;
        }

        .label-direcao {
            text-align: center;
            font-weight: 800;
            padding: 10px;
            background: #263238;
            color: white;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .grid-wrapper {
            flex: 1; /* Ocupa todo o espaço restante */
            display: flex;
            flex-direction: column;
        }

        .grid-sala {
            display: grid;
            grid-template-columns: repeat(9, 1fr); 
            grid-template-rows: repeat(5, 1fr); /* Divide em 5 linhas iguais */
            gap: 8px;
            height: 100%;
            width: 100%;
        }

        .aluno {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 800;
            border: 3px solid #bcbcbc;
            border-radius: 8px;
            cursor: pointer;
            padding: 5px;
            background-color: #fff;
            color: var(--texto);
            transition: all 0.1s;
            line-height: 1.1;
        }

        /* Estilos de Status com Contraste Máximo */
        .aluno.status-presente { 
            background-color: var(--presente); 
            color: #ffffff; 
            border-color: #000;
        }

        .aluno.status-ausente { 
            background-color: var(--ausente); 
            color: #ffffff; 
            border-color: #000;
        }

        .aluno.vazio { 
            border: 2px dashed #ddd; 
            background: #f9f9f9;
            opacity: 0.4;
        }

        /* Ajuste de fonte responsiva para nomes grandes */
        .container:fullscreen .aluno {
            font-size: 1.2vw; /* Fonte cresce conforme a largura da tela */
        }

        .resumo {
            margin-top: 10px;
            padding: 10px;
            border: 2px solid var(--ausente);
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            background: #1976D2;
            color: white;
        }

        .btn-reset { background: #607d8b; }
    </style>
</head>
<body>

    <div class="container" id="area-estudo">
        <div class="controles">
            <button onclick="toggleFullScreen()">⛶ TELA CHEIA</button>
            <button class="btn-reset" onclick="resetarChamada()">↺ LIMPAR TUDO</button>
        </div>

        <div class="label-direcao">LOUSA / PROFESSOR</div>

        <div class="grid-wrapper">
            <div class="grid-sala" id="mapa"></div>
        </div>

        <div class="label-direcao">FUNDO DA SALA</div>

        <div class="resumo">
            <strong>FALTAS:</strong> <span id="lista-faltas">Nenhuma.</span>
        </div>
    </div>

    <script>
        const layout = [
            ["Joaquim N.", "Clarice C.", "Kauê S.", "Davi M.", "Mateus S.", "Pedro B.", "Gabriel V.", "Pedro S.", "Augusto W."],
            ["Pedro H.", "Nicolas G.", "Ígor P.", "Heitor M.", "", "João Vitor P.", "Nicolas F.", "Vinicius F.", "Vinicius D."],
            ["Gustavo B.", "João Luz", "Arthur N.", "Pedro M.", "", "Marcos A.", "Lucas M.", "Arthur G.", "Bruno P."],
            ["Eloísa P.", "Beatriz W.", "Letícia S.", "Gabrielly", "", "Luiz Otávio H.", "Luiggi K.", "Lucas O.", "Henrique S."],
            ["Maria Luiza D.", "Arthur F.", "Marina M.", "", "", "Nicolas R.", "Arthur N.", "Paulo V.", "Nicolas S."]
        ];

        let estados = JSON.parse(localStorage.getItem('chamada_2C_v10')) || {};

        function renderizar() {
            const mapa = document.getElementById('mapa');
            const listaFaltas = document.getElementById('lista-faltas');
            mapa.innerHTML = '';
            let faltas = [];

            layout.forEach((fila, i) => {
                fila.forEach((nome, j) => {
                    const id = `${i}-${j}`;
                    const div = document.createElement('div');
                    
                    if (!nome || nome.trim() === "") {
                        div.className = 'aluno vazio';
                    } else {
                        div.className = 'aluno';
                        div.innerText = nome;
                        
                        if (estados[id] === 1) div.classList.add('status-presente');
                        if (estados[id] === 2) {
                            div.classList.add('status-ausente');
                            faltas.push(nome);
                        }

                        div.onclick = () => {
                            estados[id] = ((estados[id] || 0) + 1) % 3;
                            renderizar();
                        };
                    }
                    mapa.appendChild(div);
                });
            });

            listaFaltas.innerText = faltas.length > 0 ? faltas.join(', ') : "Todos presentes.";
            localStorage.setItem('chamada_2C_v10', JSON.stringify(estados));
        }

        function toggleFullScreen() {
            const elem = document.getElementById("area-estudo");
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    alert(`Erro: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function resetarChamada() {
            if(confirm("Limpar todas as marcações?")) {
                estados = {};
                renderizar();
            }
        }

        renderizar();
    </script>
</body>
</html>
