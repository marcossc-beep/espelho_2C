<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espelho de Classe - Turma 2C</title>
    <style>
        :root {
            /* Cores com contraste reforçado */
            --presente: #2e7d32; /* Verde mais escuro para contraste */
            --ausente: #d32f2f;   /* Vermelho mais vivo */
            --vazio: #cfd8dc;
            --texto: #1a1a1a;
            --bg: #eceff1;
            --accent: #1976D2;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* --- AJUSTES PARA TELA CHEIA --- */
        .container:fullscreen {
            width: 100vw;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            padding: 15px;
            justify-content: space-between; /* Distribui lousa, grid e resumo */
        }

        /* Aumenta o texto e os cards no modo tela cheia */
        .container:fullscreen .aluno {
            font-size: 1.1rem;
            border-width: 3px;
        }

        .container:fullscreen .label-direcao {
            margin: 5px 0;
            padding: 5px;
            font-size: 1rem;
        }

        .controles {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .label-direcao {
            text-align: center;
            font-weight: bold;
            padding: 8px;
            background: #37474f;
            margin: 10px 0;
            border-radius: 6px;
            font-size: 0.85rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .grid-wrapper {
            flex-grow: 1; /* Faz o grid ocupar o espaço central */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow: hidden;
        }

        .grid-sala {
            display: grid;
            grid-template-columns: repeat(9, 1fr); 
            gap: 10px;
            width: 100%;
            height: 100%; /* Ocupa o wrapper */
            max-height: 70vh; /* Limite para não empurrar o resumo */
        }

        .aluno {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            padding: 8px;
            background-color: #fff;
            color: var(--texto);
            transition: all 0.15s ease-in-out;
            word-wrap: break-word;
            line-height: 1.1;
            aspect-ratio: 4 / 3; /* Melhor proporção para nomes */
        }

        .aluno.status-presente { 
            background-color: var(--presente); 
            color: white; 
            border-color: #1b5e20;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .aluno.status-ausente { 
            background-color: var(--ausente); 
            color: white; 
            border-color: #b71c1c;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .aluno.vazio { 
            background-color: transparent; 
            border: 1px dashed #ccc; 
            cursor: default; 
            opacity: 0.3;
        }

        .resumo {
            margin-top: 15px;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
            border: 2px solid var(--ausente);
            font-size: 0.9rem;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-fullscreen { background: var(--accent); color: white; }
        .btn-reset { background: #546e7a; color: white; }

        /* Ajuste para telas pequenas fora do modo fullscreen */
        @media (max-width: 800px) {
            .grid-sala {
                grid-template-columns: repeat(9, minmax(60px, 1fr));
            }
            .grid-wrapper { overflow-x: auto; justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <div class="container" id="area-estudo">
        <div class="controles">
            <button class="btn-fullscreen" onclick="toggleFullScreen()">⛶ TELA CHEIA</button>
            <button class="btn-reset" onclick="resetarChamada()">↺ LIMPAR</button>
        </div>

        <div class="label-direcao">LOUSA / PROFESSOR</div>

        <div class="grid-wrapper">
            <div class="grid-sala" id="mapa"></div>
        </div>

        <div class="label-direcao">FUNDO DA SALA</div>

        <div class="resumo">
            <strong>FALTAS:</strong> 
            <span id="lista-faltas" style="color: var(--ausente); font-weight: 900;">Nenhuma.</span>
        </div>
    </div>

    <script>
        const layout = [
            ["Joaquim N.", "Clarice C.", "Kauê S.", "Davi M.", "Mateus S.", "Pedro B.", "Gabriel V.", "Pedro S.", "Augusto W."],
            ["Pedro H.", "Nicolas G.", "Ígor P.", "Heitor M.", "", "João Vitor P.", "Nicolas F.", "Vinicius F.", "Vinicius D."],
            ["Gustavo B.", "João Luz", "Arthur N.", "Pedro M.", "", "Marcos A.", "", "Arthur G.", "Bruno P."],
            ["Eloísa P.", "Beatriz W.", "Letícia S.", "", "", "Luiz Otávio H.", "Luiggi K.", "Lucas O.", "Henrique S."],
            ["Maria Luiza D.", "Arthur F.", "Marina M.", "", "", "Nicolas R.", "Arthur N.", "Paulo V.", "Nicolas S."]
        ];

        let estados = JSON.parse(localStorage.getItem('chamada_2C_v9')) || {};

        function renderizar() {
            const mapa = document.getElementById('mapa');
            const listaFaltas = document.getElementById('lista-faltas');
            mapa.innerHTML = '';
            let faltas = [];

            layout.forEach((fila, i) => {
                fila.forEach((nome, j) => {
                    const id = `${i}-${j}`;
                    const div = document.createElement('div');
                    
                    if (!nome || nome.trim() === "") {
                        div.className = 'aluno vazio';
                    } else {
                        div.className = 'aluno';
                        div.innerText = nome;
                        
                        if (estados[id] === 1) div.classList.add('status-presente');
                        if (estados[id] === 2) {
                            div.classList.add('status-ausente');
                            faltas.push(nome);
                        }

                        div.onclick = () => {
                            estados[id] = ((estados[id] || 0) + 1) % 3;
                            renderizar();
                        };
                    }
                    mapa.appendChild(div);
                });
            });

            listaFaltas.innerText = faltas.length > 0 ? faltas.join(', ') : "Todos presentes.";
            localStorage.setItem('chamada_2C_v9', JSON.stringify(estados));
        }

        function toggleFullScreen() {
            const elem = document.getElementById("area-estudo");
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    alert(`Erro: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function resetarChamada() {
            if(confirm("Deseja limpar as marcações?")) {
                estados = {};
                renderizar();
            }
        }

        renderizar();
    </script>
</body>
</html>
